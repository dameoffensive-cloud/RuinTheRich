function hashStr(s){
  let h=2166136261>>>0;
  for(let i=0;i<s.length;i++){ h=(h^s.charCodeAt(i))>>>0; h=Math.imul(h,16777619)>>>0; }
  return h>>>0;
}

function RNG(seed){ this.s=seed>>>0; }
RNG.prototype.next=function(){
  this.s=(this.s+0x6D2B79F5)>>>0; let t=this.s;
  t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61);
  return ((t^t>>>14)>>>0)/4294967296;
};
// gameplay randomness: seeded in daily mode so everyone plays the same market.
// cosmetic randomness (bubbles, confetti, log flavor odds) stays Math.random.
let rng=new RNG(mode==='daily'?((SEED_BASE*7919)>>>0):((Date.now()%2147483647)>>>0));

let AC=null;
function blip(freq,dur,type,gain){
  if(muted)return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.value=gain||0.035;
    o.connect(g); g.connect(AC.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
    o.stop(AC.currentTime+dur);
  }catch(e){}
}

function drain(i,amt,why){
  const b=bils[i]; if(!b.alive)return;
  b.worth-=amt;
  if(b.worth<=0){
    b.worth=0; b.alive=false;
    bankruptOrder.push(['🪙','🍌','💧','🤖'][i]);

    floaty('💀',true); sfxBankrupt();

    if(a&&a.held>0){ cash+=a.held*a.price; log(t('gotOut',t('asset'+assets.indexOf(a)),fmt(a.held*a.price))); a.held=0; }
    checkWin();
  }
}

/* ---------- player actions ---------- */
function buy(i,max){
  const a=assets[i], b=bils[a.owner]; if(!b.alive||won)return;
  let n=0;
  do{
    if(cash<a.price||a.held>=cap())break;
    cash-=a.price; enrich(a.owner,a.price); a.held++;
    a.price=clampP(a.price*(1+impact())); n++;
  }while(max);
  if(n>0){ playerLast={type:'buy',asset:i,qty:n}; sfxBuy(); log(t('buyLog',n,t('asset'+i))); render(); }
}
function dump(i){
  const a=assets[i], b=bils[a.owner]; if(!b.alive||won)return;
  if(a.held===0)return;
  let got=0, n=a.held;
  while(a.held>0){
    a.held--;
    const paid=a.price;
    got+=paid;
    a.price=clampP(a.price*(1-impact()));
    drain(a.owner,paid,t('whyDump'));
  }
  cash+=got;
  playerLast={type:'sell',asset:i,qty:n};
  sfxDump(); floaty('+'+fmt(got),true);
  log(t('dumpLog',n,t('asset'+i),fmt(got)));
  render();
}

/* ---------- billionaire brains ---------- */
function tick(silent){
  tickN++;
  cash+=upgrades[2].lvl*2;
  const cm=chaosMult();
  const bq=[]; // bubbles queued until after render, so render doesn't wipe them

  // BILLIONAIRISM: they passively earn interest just for existing.
  // rich = earns a lot. wounded = earns crumbs. that's your opening.
  const W=START_WORTH*Math.pow(8,prestige); // scale losses with prestige wealth
  const capW=W*2;
  bils.forEach(b=>{
    if(b.alive&&b.worth<capW)b.worth=Math.min(capW,b.worth*1.003+1);
  });
  if(!silent&&Math.random()<0.04)log(t('interestLog'));

  // snapshot: which prices fell hard since last tick (player dumps included)
  const crashes=assets.map(a=>a.lastTick>0 && a.price < a.lastTick*(1-P.ivanaThresh));
  const dips=assets.map(a=>a.price<a.lastTick);

  // CHADWICK: copies your buys, at the top
  if(bils[0].alive && playerLast && playerLast.type==='buy'){
    const a=assets[playerLast.asset];
    if(bils[a.owner].alive){
      a.price=clampP(a.price*(1+P.chadPump*cm));
      const hist=a.hist.slice(-15), avg=hist.reduce((s,x)=>s+x,0)/hist.length;
      if(a.price>avg*1.1){ drain(0,W*0.008*cm,t('whyAped',t('asset'+playerLast.asset))); if(!silent)bq.push([0,t('bMoon')]); }
      else if(!silent)bq.push([0,t('bFew')]);
      if(!silent&&Math.random()<0.4)log(t('chadLog',t('asset'+playerLast.asset)));
    }
    playerLast=null;
  } else if(playerLast&&playerLast.type==='sell'){ playerLast=null; }

  // IVANA: panic
  if(ivanaCool>0)ivanaCool--;
  if(bils[3].alive && ivanaCool===0 && crashes.some(c=>c)){
    assets.forEach(a=>{a.price=clampP(a.price*(1-0.14*cm));});
    drain(3,W*P.ivanaDmg*cm,t('whyPanic'));
    ivanaCool=8;
    if(!silent){bq.push([3,t('bSell')]); log(t('panicLog'),true);}
  }

  // BARON: buys every dip
  if(bils[1].alive){
    let bought=false;
    assets.forEach((a,i)=>{
      if(dips[i]&&R()<0.8){
        a.price=clampP(a.price*(1+0.05*cm));
        drain(1,W*(P.baronCost/2500)*cm,t('whyKnife'));
        bought=true;
      }
    });
    if(bought&&!silent&&Math.random()<0.5)bq.push([1,t('bBaron')]);
  }

  // GRIMBLE: self-inflating water bubble
  if(bils[2].alive){
    const w=assets[2];
    w.price=clampP(w.price*(1+0.09*cm));
    if(w.price>w.base*P.grimbleCap){
      w.price=w.base*(0.8+R()*0.4);
      drain(2,W*0.12*cm,t('whyPop'));
      if(!silent){bq.push([2,t('bWater')]); log(t('popLog'),true);}
    } else if(!silent&&Math.random()<0.15)bq.push([2,t('bGold')]);
  }

  // gentle drift + flavor losses
  assets.forEach(a=>{ a.price=clampP(a.price*(1+(R()-0.5)*0.04)); });
  if(R()<0.12){
    const fl=[[0,5],[1,8],[2,4],[3,6]];
    const fi=Math.floor(R()*fl.length), f=fl[fi];
    if(bils[f[0]].alive){ drain(f[0],f[1]*(W/2500),t('whyMisc')); if(!silent&&Math.random()<0.5)log(t('flavor'+fi)); }
  }

  // toy repossession
  bils.forEach((b,i)=>{
    const pct=b.worth/(START_WORTH*Math.pow(8,prestige));
    const should=pct>0.75?3:pct>0.5?2:pct>0.25?1:0;
    if(b.alive&&b.toys.length>should){
      const toy=b.toys.pop();
      if(!silent)log(t('toyLog',b.name.split(' ')[0],toy));
    }
  });

  assets.forEach(a=>{ a.lastTick=a.price; a.hist.push(a.price); if(a.hist.length>30)a.hist.shift(); });
  if(!silent){ render(); bq.forEach(x=>bubble(x[0],x[1])); }
  if(tickN%5===0)save();
}

/* ---------- rendering ---------- */
function spark(a){
  const h=a.hist, min=Math.min(...h), max=Math.max(...h), r=(max-min)||1;
  const pts=h.map((p,i)=>((i/(h.length-1||1))*70).toFixed(1)+','+(20-((p-min)/r)*18+2).toFixed(1)).join(' ');
  const up=h[h.length-1]>=h[0];
  return '<svg class="spark" width="72" height="24"><polyline points="'+pts+'" fill="none" stroke="'+(up?'#4a9e5c':'#e05252')+'" stroke-width="2"/></svg>';
}
function renderBils(){
  $('bils').innerHTML=bils.map((b,i)=>{
    const full=START_WORTH*Math.pow(8,prestige);
    const pct=Math.max(0,Math.min(100,(b.worth/full)*100));
    return '<div class="bil'+(b.alive?'':' dead')+'" id="bil'+i+'">'
      +'<div class="bubble"></div>'
      +doodles[b.key]
      +'<div class="name">'+b.name+(b.alive?'':' 💀')+'</div>'
      +'<div class="title">'+t('bilTitle'+i)+'</div>'
      +'<div class="toys">'+(b.alive?b.toys.join(' '):t('seized'))+'</div>'
      +'<div class="worthwrap"><div class="worthbar" style="width:'+pct+'%; background:'+(pct>50?'#4a9e5c':pct>25?'#d9a441':'#e05252')+'"></div></div>'
      +'<div class="worthtxt">'+(b.alive?fmt(b.worth)+' <small>'+t('perRound',fmt(b.worth*0.003+1))+'</small>':t('broke'))+'</div>'
      +'<div class="rule">'+t('bilRule'+i)+'</div>'
      +'</div>';
  }).join('');
}
function renderMarket(){
  $('market').innerHTML='<tr><th></th><th>'+t('thPrice')+'</th><th>'+t('thChart')+'</th><th>'+t('thHold')+'</th><th></th></tr>'
    +assets.map((a,i)=>{
      const b=bils[a.owner], dead=!b.alive;
      const dir=a.hist.length>1?(a.price>=a.hist[a.hist.length-2]?'up':'down'):'up';
      return '<tr>'
        +'<td>'+a.emoji+' <b>'+t('asset'+i)+'</b><br><small style="opacity:.6">'+t('house')+b.name.split(' ')[0]+(dead?' 💀':'')+'</small></td>'
        +'<td class="price '+dir+'">'+(dead?'—':((dir==='up'?'▲ ':'▼ ')+fmt(a.price)))+'</td>'
        +'<td>'+spark(a)+'</td>'
        +'<td>'+a.held+'/'+cap()+'</td>'
        +'<td><button id="buy'+i+'" onclick="buy('+i+',false)" '+(dead||cash<a.price||a.held>=cap()?'disabled':'')+'>'+t('buy')+'</button>'
        +'<button id="mx'+i+'" onclick="buy('+i+',true)" '+(dead||cash<a.price||a.held>=cap()?'disabled':'')+'>'+t('max')+'</button>'
        +'<button id="dp'+i+'" class="dump" onclick="dump('+i+')" '+(dead||a.held===0?'disabled':'')+'>'+t('dump')+'</button></td>'
        +'</tr>';
    }).join('');
}
function renderUpgrades(){
  $('upgrades').innerHTML=upgrades.map((u,i)=>{
    const maxed=u.lvl>=u.max, c=u.cost(u.lvl);
    return '<div class="upg"><div><b>'+t('upgName'+i)+'</b> <small>'+t('lv')+u.lvl+'</small><small>'+t('upgDesc'+i)+'</small></div>'
      +'<button id="ug'+i+'" onclick="buyUpg('+i+')" '+(maxed||cash<c?'disabled':'')+'>'+(maxed?t('maxLbl'):fmt(c))+'</button></div>';
  }).join('');
}
function buyUpg(i){
  const u=upgrades[i], c=u.cost(u.lvl);
  if(cash<c||u.lvl>=u.max)return;
  cash-=c; u.lvl++;
  floaty('-'+fmt(c),false); sfxBuy();
  log(t('upgLog',t('upgName'+i),t('lv')+u.lvl));
  render();
}
function render(){
  // remember focus: the UI re-renders every tick, which would otherwise
  // knock keyboard/gamepad focus loose mid-navigation
  const focusId=(document.activeElement&&document.activeElement.id)||null;
  $('cash').textContent=fmt(cash).slice(1);
  const sk=getStreak();
  $('badges').textContent='🏆'.repeat(prestige)+(sk.n>=2?' 🔥'+sk.n:'');
  $('sharetop').style.display=(mode==='daily')?'':'none';
  renderBils(); renderMarket(); renderUpgrades();
  if(focusId){ const el=$(focusId); if(el&&!el.disabled)el.focus(); }
  save();
}

/* ---------- gamepad support ----------
   d-pad / left stick moves focus, A presses, B closes the win screen. */
(function(){
  let prev={};
  function focusables(){
    return Array.from(document.querySelectorAll('button,select'))
      .filter(el=>el.offsetParent!==null&&!el.disabled);
  }
  function move(dir){
    const els=focusables(); if(!els.length)return;
    let i=els.indexOf(document.activeElement);
    i=(i<0)?0:(i+dir+els.length)%els.length;
    els[i].focus();
    els[i].scrollIntoView({block:'nearest'});
  }
  const pr=(gp,i)=>!!(gp.buttons[i]&&gp.buttons[i].pressed);
  setInterval(()=>{
    const gps=navigator.getGamepads?navigator.getGamepads():[];
    let gp=null;
    for(let i=0;i<gps.length;i++){ if(gps[i]){gp=gps[i];break;} }
    if(!gp)return;
    const ax=gp.axes[0]||0, ay=gp.axes[1]||0;
    const st={
      fwd: pr(gp,15)||pr(gp,13)||ax>0.6||ay>0.6,
      back:pr(gp,14)||pr(gp,12)||ax<-0.6||ay<-0.6,
      a:pr(gp,0), b:pr(gp,1)
    };
    if(st.fwd&&!prev.fwd)move(1);
    if(st.back&&!prev.back)move(-1);
    if(st.a&&!prev.a&&document.activeElement&&document.activeElement.click)document.activeElement.click();
    if(st.b&&!prev.b&&$('overlay').classList.contains('show'))$('prestige').click();
    prev=st;
  },120);
})();

function bootGame(){
  $('start').style.display='none';
  // sweep expired daily saves
  try{
    for(let k=localStorage.length-1;k>=0;k--){
      const key=localStorage.key(k);
      if(key&&key.indexOf('rtr-daily-')===0&&key.split('-')[2]!==String(DAY))localStorage.removeItem(key);
    }
  }catch(e){}
  applyLang();
  const savedAt=load();
  $('mutebtn').textContent=muted?'🔇':'🔊';
  if(!savedAt&&mode==='daily'){
    cash=P.startCash;
    assets.forEach((a,i)=>{ a.price=Math.round(a.base*P.priceMult[i]*10)/10; a.hist=[a.price]; a.lastTick=a.price; });
  }
  if(savedAt){
    const missed=Math.min(Math.floor((Date.now()-savedAt)/2000),1000);
    for(let k=0;k<missed;k++)tick(true);
    log(t('welcomeBack',missed),true);
    if(bils.every(b=>!b.alive)){ won=false; checkWin(); }
  }else{
    log(t('welcome'),true);
  }
  render();

  // clock (lazy-friendly: catches up while you were gone)
  let lastTick=Date.now();
  setInterval(()=>{
    const now=Date.now();
    let n=Math.floor((now-lastTick)/2000);
    if(n<=0)return;
    lastTick+=n*2000;
    if(n>2){
      const runs=Math.min(n,400);
      for(let k=0;k<runs;k++)tick(true);
      log(t('catchup',runs),true);
      render();
    } else {
      while(n-->0)tick(false);
    }
  },1000);
}
